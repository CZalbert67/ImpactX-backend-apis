name: .NET CI & Security Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código del repositorio
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Configurar el entorno de .NET (Versión 10.x / 9.x compatible)
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    # 3. Restaurar dependencias
    - name: Restore Dependencies
      run: dotnet restore Prueba1.slnx

    # 4. DevSecOps: Auditoría de seguridad en paquetes de NuGet (Vulnerabilidades)
    - name: NuGet Security Audit
      run: |
        dotnet list Prueba1.slnx package --vulnerable
        dotnet restore Prueba1.slnx --audit

    # 5. Compilar el proyecto en modo Release
    - name: Build Application
      run: dotnet build Prueba1.slnx --no-restore --configuration Release

    # 6. Ejecutar pruebas unitarias y de integración
    - name: Run Tests (Unit & Integration)
      run: dotnet test Prueba1.slnx --no-build --configuration Release --verbosity normal
